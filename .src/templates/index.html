<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="{{ doc_root }}css/style.css">
    <meta charset="utf-8">
</head>

<body>
    <h2>目录</h2>
    <div id="index">
        <table>
            {% for post in post_list %}
            <tr>
                <td> <a href="./{{ post.file_name }}">{{ post.title }}</a> </td>
                <td>{{ post.author }}</td>
                <td>{{ post.date }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
